<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Follow Builders{% endblock %}</title>
    <meta name="theme-color" content="#0f0f12">
    <meta name="description" content="AI-powered daily digest from top builders">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/favicon.ico">
    <style>
        :root {
            --bg: #0f0f12;
            --surface: #1a1a1f;
            --surface-hover: #22222a;
            --text: #e8e8ec;
            --text-muted: #9a9aa4;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a35;
            --radius: 12px;
            --danger: #ef4444;
            --success: #22c55e;
        }
        
        [data-theme="light"] {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface-hover: #f1f3f5;
            --text: #1a1a2e;
            --text-muted: #6c757d;
            --border: #dee2e6;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        nav .logo {
            font-weight: 800;
            font-size: 1.25rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        nav .logo span { font-size: 1.4rem; }
        nav .links {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        nav .links a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.15s;
        }
        nav .links a:hover, nav .links a.active {
            color: var(--text);
            background: var(--surface-hover);
        }
        .theme-toggle {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--text);
            transition: all 0.15s;
        }
        .theme-toggle:hover {
            background: var(--accent);
            color: #fff;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
        }
        .card h2 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 18px;
            border-radius: var(--radius);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger {
            background: rgba(239,68,68,0.15);
            color: var(--danger);
        }
        .btn-danger:hover { background: rgba(239,68,68,0.25); }
        .btn-sm {
            padding: 6px 12px;
            font-size: 0.8rem;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .source-list {
            list-style: none;
        }
        .source-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
        }
        .source-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .source-item .name {
            font-weight: 600;
            font-size: 0.95rem;
        }
        .source-item .meta {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-x { background: rgba(99,102,241,0.15); color: var(--accent); }
        .badge-podcast { background: rgba(34,197,94,0.15); color: var(--success); }
        .badge-blog { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
        }
        .modal h3 {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 22px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-weight: 500;
            z-index: 300;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--danger); color: var(--danger); }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 20px 14px; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav>
        <div class="nav-inner">
            <a href="/" class="logo"><span>🚀</span> Follow Builders</a>
            <div class="links">
                <a href="/" class="{% if request.path == '/' %}active{% endif %}">Sources</a>
                <a href="/archive" class="{% if request.path == '/archive' %}active{% endif %}">Archive</a>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <div class="toast" id="toast"></div>
    {% block scripts %}{% endblock %}
    
    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'dark';
        html.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        
        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeToggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
        
        // Service Worker registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
